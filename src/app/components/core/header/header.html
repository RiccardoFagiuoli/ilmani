<div class="py-3 border-bottom">
  <div class="container">
    <div class="header-content">
      <div class="header-left">
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Apri menu Esplora" (click)="openSidebar()">
          <i class="fas fa-bars" aria-hidden="true"></i>
          <span class="fw-normal">Esplora</span>
        </button>
      </div>
      <div class="header-center">
        <a href="#" aria-label="Torna alla homepage">
          <img src="https://placehold.co/350x60/cccccc/666666?text=LOGO" alt="Logo del sito" class="logo-img" id="mainLogo"
               [style.height.px]="logoHeight">
        </a>
      </div>
      <div class="header-right">
        <button class="btn btn-danger py-2 fw-bold rounded-0-1 d-flex justify-content-center" aria-label="Abbonati">Abbonati</button>
        <button class="btn btn-outline-danger py-2 fw-bold rounded-0-1 d-flex justify-content-center" aria-label="Entra">Entra</button>
      </div>
    </div>
  </div>
</div>

<div class="red-line" aria-hidden="true"></div>
